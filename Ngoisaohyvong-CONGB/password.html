<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ngôi sao hy vọng</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top,#1a0030,#000 70%);color:#fff} 
.card{width:min(420px,92vw);padding:32px;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(14px);box-shadow:0 0 40px rgba(255,0,180,.18)}
h1{margin:0 0 10px;font-size:32px}.sub{opacity:.8;margin-bottom:20px}input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:16px}button{margin-top:14px;width:100%;padding:14px;border:0;border-radius:14px;background:linear-gradient(90deg,#ff77d9,#ff2fb8);color:#fff;font-weight:700;cursor:pointer}button:hover{filter:brightness(1.08)}#msg{margin-top:12px;min-height:22px;font-size:14px;opacity:.9}
</style>
</head>
<body>
<div class="card">
<h1>🦄 Nhập password để mở quà nha!</h1>
<div class="sub">Gợi ý: Sinh nhật của ông nội nhõ...DD/MM</div>
<input id="pass" type="password" placeholder="Nhập mật khẩu..." />
<button onclick="login()">Mở quà</button>
<div id="msg"></div>
</div>
<script>
const PASSWORD='0812';
function login(){
 const v=document.getElementById('pass').value;
 const msg=document.getElementById('msg');
 if(v===PASSWORD){
   msg.textContent='Đỉnh quá!!!';
   msg.style.color='#8ff';
   setTimeout(()=>{window.location.href='congb.html';},700);
 }else{
   msg.textContent='Sai mật khẩu';
   msg.style.color='#ff8fbf';
 }
}
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script>
</body>
</html>
