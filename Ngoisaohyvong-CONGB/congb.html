<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ngôi sao hy vọng</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at center,#140018,#000 70%);font-family:Inter,Arial,sans-serif}
#app{position:fixed;inset:0}
.top{position:fixed;top:18px;left:50%;transform:translateX(-50%);font-size:54px;pointer-events:none;font-weight:900;letter-spacing:2px;color:#ff77d9;text-shadow:0 0 10px #ff77d9,0 0 30px #ff2fb8;z-index:5;animation:pulse 2s infinite}
.sub{position:fixed;top:82px;left:50%;transform:translateX(-50%);pointer-events:none;color:#fff;opacity:.8;z-index:5}
.panel{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);width:min(820px,92vw);padding:22px;border-radius:24px;background:rgba(10,10,20,.58);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);color:#8ff;z-index:5;box-shadow:0 0 30px rgba(255,0,170,.18)}
.small{opacity:.7;font-size:14px;margin-top:8px}
.btns{position:fixed;right:18px;top:18px;z-index:6;display:flex;gap:10px}
button{border:0;padding:10px 14px;border-radius:14px;background:#ffffff18;color:#fff;cursor:pointer;backdrop-filter:blur(10px)}
button:hover{background:#ffffff28}
@keyframes pulse{50%{transform:translateX(-50%) scale(1.05)}}
</style>
</head>
<body>
<div id='app'></div>
<div class='top'>CONGB</div>
<div class='sub'>NGÔI SAO HY VỌNG</div>
<div class='btns'><button onclick='toggleSpin()'>Bùm</button><button onclick='boost()'>Tỏa sáng</button></div>
<div id='photos' style='position:fixed;inset:0;pointer-events:none;z-index:6'></div>
<audio id='bgm' loop autoplay>
<source src='https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f1c2f4.mp3?filename=space-ambient-110997.mp3' type='audio/mpeg'>
</audio>
<script type='module'>
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,0.03);
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,1000);camera.position.set(0,1,8);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setPixelRatio(devicePixelRatio);renderer.setSize(innerWidth,innerHeight);document.getElementById('app').appendChild(renderer.domElement);
const ambient=new THREE.AmbientLight(0xff88ff,1.1);scene.add(ambient);
const light=new THREE.PointLight(0xffffff,2.8,100);light.position.set(5,5,8);scene.add(light);
let speed=.01, paused=false;
const starGeo=new THREE.BufferGeometry();const starCount=5000;const arr=[];for(let i=0;i<starCount;i++){arr.push((Math.random()-.5)*220,(Math.random()-.5)*220,(Math.random()-.5)*220)}starGeo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
const stars=new THREE.Points(starGeo,new THREE.PointsMaterial({size:.18,color:0xffffff}));scene.add(stars);
const planet=new THREE.Mesh(new THREE.SphereGeometry(1.45,96,96),new THREE.MeshPhysicalMaterial({color:0xff8ed8,emissive:0xff44aa,emissiveIntensity:1,roughness:.25,metalness:.3,clearcoat:1}));scene.add(planet);
let cracked=false;
const atmosphere=new THREE.Mesh(new THREE.SphereGeometry(1.58,64,64),new THREE.MeshBasicMaterial({color:0xff77dd,transparent:true,opacity:.12}));scene.add(atmosphere);
const ring=new THREE.Mesh(new THREE.TorusGeometry(2.2,.09,32,240),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xff77dd,emissiveIntensity:1.3}));ring.rotation.x=1.22;scene.add(ring);
function makeText(msg,size=60){const c=document.createElement('canvas');c.width=1024;c.height=256;const x=c.getContext('2d');x.fillStyle='rgba(0,0,0,0)';x.fillRect(0,0,c.width,c.height);x.font='900 '+size+'px Arial';x.textAlign='center';x.fillStyle='#ff7be7';x.shadowBlur=30;x.shadowColor='#ff2fb8';x.fillText(msg,512,150);return new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}))}
const words=['CONGB','UNICONG','CONGB','UNICONG'];const labels=words.map((w,i)=>{const s=makeText(w,58);s.scale.set(4,1,1);scene.add(s);return s;});
let mx=0,my=0;addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5)*2;my=(e.clientY/innerHeight-.5)*2});
window.toggleSpin=()=>paused=!paused;
window.boost=()=>{speed=.12;flash();setTimeout(()=>speed=.01,1800)};
function flash(){document.body.animate([{filter:'brightness(1)'},{filter:'brightness(2.5)'},{filter:'brightness(1)'}],{duration:700});}
function animate(){requestAnimationFrame(animate);const t=performance.now()*0.001;
if(!paused){planet.rotation.y+=speed;ring.rotation.z+=speed*1.5;stars.rotation.y+=0.0009;scene.rotation.y+=0.0005;}
camera.position.x=Math.sin(mx)*5;camera.position.y=my*2+1;camera.lookAt(0,0,0);
labels.forEach((s,i)=>{const a=t+i*Math.PI/2;s.position.set(Math.cos(a)*(2.9+i*.15),Math.sin(a*2)*.45,Math.sin(a)*(2.9+i*.15));s.scale.setScalar(1+Math.sin(t*4+i)*0.15+1);});
if(Math.floor(t*2)%8===0){planet.scale.setScalar(1.05);}else{planet.scale.lerp(new THREE.Vector3(1,1,1),0.08);}
renderer.render(scene,camera)}animate();
document.body.addEventListener('pointerdown',()=>{const a=document.getElementById('bgm');a.play().catch(()=>{});},{once:true});
const imgs=['CONGB.1.jpg','CONGB.4.jpg','CONGB.6.jpg','CONGB.7.jpg','CONGB.8.jpg','CONGB.11.jpg','CONGB.12.jpg','CONGB.13.jpg','CONGB.14.jpg','CONGB.15.jpg'];
const wrap=document.getElementById('photos');
for(let k=0;k<imgs.length;k++){const burst=document.createElement('img');burst.src=imgs[k];burst.style.cssText='position:absolute;width:58px;height:58px;object-fit:cover;border-radius:50%;mix-blend-mode:screen;opacity:.72;filter:drop-shadow(0 0 14px rgba(255,120,220,.55));border:2px solid rgba(255,255,255,.22);';wrap.appendChild(burst);const angle=(Math.PI*2/imgs.length)*k + (k%2)*0.28;const maxR=Math.min(innerWidth,innerHeight)*0.34;const orbit=[165,230,295,360];const r=Math.min(orbit[k%4],maxR);function sway(){const t=performance.now()*0.001;const dx=Math.cos(t*0.8+k)*8;const dy=Math.sin(t*1.1+k)*8;burst.style.left=`calc(50% + ${Math.cos(angle)*r + dx}px - 35px)`;burst.style.top=`calc(50% + ${Math.sin(angle)*r + dy + 25}px - 35px)`;requestAnimationFrame(sway);}sway();}
addEventListener('click',()=>{if(!cracked){cracked=true;planet.material.color.set(0xaed8ff);planet.material.emissive.set(0x8fcfff);for(let j=0;j<12;j++){const shard=new THREE.Mesh(new THREE.TetrahedronGeometry(.18+Math.random()*.08),new THREE.MeshStandardMaterial({color:0xc9e7ff,emissive:0xa9dcff,emissiveIntensity:1}));shard.position.copy(planet.position);scene.add(shard);const vx=(Math.random()-.5)*.18,vy=(Math.random()-.5)*.18,vz=(Math.random()-.5)*.18;let n=0;function burst(){n++;shard.position.x+=vx;shard.position.y+=vy;shard.position.z+=vz;shard.rotation.x+=.1;shard.rotation.y+=.1;if(n<80) requestAnimationFrame(burst); else scene.remove(shard);}burst();}
setTimeout(()=>{planet.material.color.set(0xff8ed8);planet.material.emissive.set(0xff44aa);cracked=false;},2200);}for(let i=0;i<30;i++){ const m=new THREE.Mesh(new THREE.SphereGeometry(.03,8,8),new THREE.MeshBasicMaterial({color:0xffffff}));m.position.set((Math.random()-.5)*8,(Math.random()-.5)*4,-6);scene.add(m);const vx=(Math.random()-.5)*.2,vy=(Math.random()-.5)*.2,vz=.35+Math.random()*.25;let life=0;function fly(){life++;m.position.x+=vx;m.position.y+=vy;m.position.z+=vz;if(life<80) requestAnimationFrame(fly); else scene.remove(m);}fly();}});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
